<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#F5D98B"/>
      <stop offset="40%"  stop-color="#C9A84C"/>
      <stop offset="100%" stop-color="#8B6914"/>
    </linearGradient>
    <radialGradient id="bg" cx="40%" cy="35%" r="70%">
      <stop offset="0%"   stop-color="#2a2a2a"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </radialGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="50" cy="50" r="48" fill="url(#bg)"/>
  <!-- Gold ring -->
  <circle cx="50" cy="50" r="48" fill="none" stroke="url(#gold)" stroke-width="3"/>

  <!-- Geometric E -->
  <!-- Vertical spine -->
  <rect x="22" y="22" width="11" height="56" rx="2" fill="url(#gold)"/>
  <!-- Top bar -->
  <rect x="22" y="22" width="44" height="11" rx="2" fill="url(#gold)"/>
  <!-- Middle bar -->
  <rect x="22" y="44.5" width="36" height="10" rx="2" fill="url(#gold)"/>
  <!-- Bottom bar -->
  <rect x="22" y="67" width="44" height="11" rx="2" fill="url(#gold)"/>

  <!-- Corner accent dots -->
  <circle cx="67" cy="27" r="2.5" fill="#F5D98B" opacity="0.9"/>
  <circle cx="67" cy="73" r="2.5" fill="#F5D98B" opacity="0.9"/>
</svg>